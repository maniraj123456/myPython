repos:
- repo: https://github.com/pre-commit/pre-commit-hooks
  rev: v6.2.0 # Use the latest stable version
  hooks:
    - id: trailing-whitespace
    - id: end-of-file-fixer
    - id: check-yaml
- repo: https://github.com/psf/black
  rev: 24.3.0 # Use the specific version of your linter/formatter
  hooks:
    - id: black
repos:
  - repo: https://github.com/pycqa/pylint
    rev: v3.2.6
    hooks:
      - id: pylint
        args: ["--fail-under=9.0"]